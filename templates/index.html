<!DOCTYPE html>
<html>
<head>
    <title>SentinelPass</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Bootstrap (optional but recommended) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🔐 SentinelPass</a>
    <div class="ms-auto">
      <a class="btn btn-sm btn-light me-2" href="/login">Login</a>
      <a class="btn btn-sm btn-warning" href="/register">Register</a>
    </div>
  </div>

</nav>
<div class="container text-center mt-5" style="max-width:600px;">

    <h1 class="mb-3 fw-bold">🔐 SentinelPass</h1>
    <p class="subtitle mb-4">Enterprise Password Intelligence Platform</p>

    <!-- PASSWORD INPUT -->
    <div class="input-group mb-3">
        <input type="password"
               id="password"
               class="form-control"
               placeholder="Enter password">

        <button class="btn btn-outline-secondary"
                type="button"
                onclick="togglePassword()">
            👁
        </button>
    </div>

    <!-- STRENGTH BAR -->
    <div class="progress mb-3" style="height:8px;">
        <div id="strength-bar"
             class="progress-bar"
             style="width:0%;">
        </div>
    </div>

    <!-- GENERATE BUTTON -->
    <button onclick="generatePassword()"
            class="btn btn-primary w-100 mb-3">
        Generate Secure Password
    </button>

    <!-- RESULTS -->
    <div id="results" class="mt-3 text-start" style="display:none;"></div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Link JS (VERY IMPORTANT — must be before </body>) -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
