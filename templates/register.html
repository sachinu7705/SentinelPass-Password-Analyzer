<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🔐 SentinelPass</a>
    <div class="ms-auto">
      <a class="btn btn-sm btn-light" href="/">Analyzer</a>
    </div>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 85vh;">

    <div class="card shadow p-4" style="width: 360px;">
        <h4 class="text-center mb-4">Create Account 🚀</h4>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form id="registerForm" method="POST">

            <div class="mb-3">
                <input id="email" name="email" type="email"
                       class="form-control"
                       placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <input id="password" name="password" type="password"
                       class="form-control"
                       placeholder="Create password" required>
            </div>

            <div class="mb-3">
                <input id="confirm_password" name="confirm_password"
                       type="password"
                       class="form-control"
                       placeholder="Confirm password" required>
            </div>

            <button type="button"
                    class="btn btn-warning w-100"
                    onclick="sendOtp()">
                Send OTP
            </button>

        </form>

        <hr>

        <!-- Google Register -->
        <a href="/login/google" class="btn btn-danger w-100">
            Register with Google
        </a>

        <div class="text-center mt-3">
            <small>Already have an account?</small>
            <a href="/login">Login here</a>
        </div>

    </div>

</div>

<!-- OTP Modal -->
<div class="modal fade" id="otpModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4 text-center">

      <h5 class="mb-3">Verify Your Email</h5>
      <p class="small text-muted">Enter the 6-digit code sent to your email</p>

      <div id="otpBoxes" class="d-flex justify-content-center gap-2 mb-3">
        <input class="otp-box form-control text-center" maxlength="1">
        <input class="otp-box form-control text-center" maxlength="1">
        <input class="otp-box form-control text-center" maxlength="1">
        <input class="otp-box form-control text-center" maxlength="1">
        <input class="otp-box form-control text-center" maxlength="1">
        <input class="otp-box form-control text-center" maxlength="1">
      </div>

      <span id="timerText">Resend available in 60s</span>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='register.js') }}"></script>
</body>
</html>
