<!DOCTYPE html>
<html>
<head>
    <title>{{ title if title else "SentinelPass" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-5">

    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="/">🔐 SentinelPass</a>

    <!-- Navbar links -->
    <div class="navbar-nav ms-4">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/analyzer">Analyzer</a>
    </div>

    <!-- Right side user section -->
    <div class="ms-auto d-flex align-items-center">

        {% if current_user.is_authenticated %}

            <!-- Avatar -->
            <div class="me-3">
                <span class="badge bg-primary rounded-circle p-3">
                    {{ current_user.email[0] | upper }}
                </span>
            </div>

            <!-- Profile -->
            <a class="btn btn-sm btn-outline-light me-2" href="/profile">
                Profile
            </a>

            <!-- Logout -->
            <a class="btn btn-sm btn-danger" href="/logout">
                Logout
            </a>

        {% else %}

            <a class="btn btn-sm btn-light me-2" href="/login">Login</a>
            <a class="btn btn-sm btn-primary" href="/register">Register</a>

        {% endif %}

    </div>

  </div>
</nav>


<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
